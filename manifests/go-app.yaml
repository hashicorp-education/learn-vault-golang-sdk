apiVersion: v1
kind: Pod
metadata:
  name: vault-client
  labels:
    app: vault-client
    namespace: default
spec:
  serviceAccountName: vault-auth
  containers:
    - name: vault-client
      image: docker.io/library/vault-sdk-go-app:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: VAULT_ADDR
          value: "https://192.168.65.254:8200"
        - name: VAULT_TOKEN
          value: root
